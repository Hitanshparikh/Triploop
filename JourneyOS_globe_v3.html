
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#070D1B}
.wrap{background:#070D1B;font-family:'DM Sans',sans-serif;color:#DDE2F0;padding:0}
.gcard{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:20px;overflow:hidden;margin:16px}
.ghead{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 0}
.glogo{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;letter-spacing:-.5px}
.glogo span{color:#4C7BFF}
.gbadge{display:flex;align-items:center;gap:6px;background:rgba(76,123,255,.12);border:1px solid rgba(76,123,255,.25);border-radius:20px;padding:4px 10px;font-size:11px;color:#7BA9FF}
.gldot{width:6px;height:6px;border-radius:50%;background:#22D3EE;animation:ld 1s infinite}
@keyframes ld{0%,100%{opacity:1}50%{opacity:.2}}
.globe-container{position:relative;width:100%;height:420px;display:flex;align-items:center;justify-content:center;overflow:hidden}
canvas#g{cursor:grab;display:block}
canvas#g:active{cursor:grabbing}
.hint{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);font-size:11px;color:#445068;pointer-events:none;white-space:nowrap}
.city-legend{display:flex;gap:0;border-top:1px solid rgba(255,255,255,.06)}
.cl{flex:1;padding:12px 16px;border-right:1px solid rgba(255,255,255,.06);display:flex;align-items:center;gap:8px}
.cl:last-child{border-right:none}
.cldot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.clinfo .cn{font-size:12px;font-weight:500;color:#C8D0E4}
.clinfo .cd{font-size:10px;color:#445068}
.zoom-btns{position:absolute;right:14px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px}
.zb{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#A0A8C0;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;line-height:1}
.zb:hover{background:rgba(76,123,255,.2);border-color:rgba(76,123,255,.4);color:#7BA9FF}
</style>

<h2 class="sr-only">JourneyOS interactive 3D globe showing the Tokyo, Kyoto, Osaka, Nara route in Japan with drag rotation and scroll zoom</h2>

<div class="wrap">
  <div class="gcard">
    <div class="ghead">
      <div class="glogo">Journey<span>OS</span> &mdash; Route Globe</div>
      <div class="gbadge"><div class="gldot"></div>Tokyo Expedition · 4 cities</div>
    </div>
    <div class="globe-container">
      <canvas id="g"></canvas>
      <div class="zoom-btns">
        <div class="zb" onclick="zoomIn()" title="Zoom in">+</div>
        <div class="zb" onclick="zoomOut()" title="Zoom out">−</div>
        <div class="zb" onclick="resetView()" title="Reset" style="font-size:13px">⟳</div>
      </div>
      <div class="hint">Drag to rotate · Scroll to zoom</div>
    </div>
    <div class="city-legend">
      <div class="cl"><div class="cldot" style="background:#4C7BFF"></div><div class="clinfo"><div class="cn">Tokyo</div><div class="cd">Day 1–5 · Start</div></div></div>
      <div class="cl"><div class="cldot" style="background:#A78BFA"></div><div class="clinfo"><div class="cn">Kyoto</div><div class="cd">Day 6–9</div></div></div>
      <div class="cl"><div class="cldot" style="background:#22D3EE"></div><div class="clinfo"><div class="cn">Osaka</div><div class="cd">Day 10–11</div></div></div>
      <div class="cl"><div class="cldot" style="background:#34D399"></div><div class="clinfo"><div class="cn">Nara</div><div class="cd">Day 12 · End</div></div></div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('g');
const ctx = canvas.getContext('2d');

const CITIES = [
  { name: 'Tokyo',  lat: 35.6762, lon: 139.6503, color: '#4C7BFF', days: 'Day 1–5' },
  { name: 'Kyoto',  lat: 35.0116, lon: 135.7681, color: '#A78BFA', days: 'Day 6–9' },
  { name: 'Osaka',  lat: 34.6937, lon: 135.5023, color: '#22D3EE', days: 'Day 10–11' },
  { name: 'Nara',   lat: 34.6851, lon: 135.8048, color: '#34D399', days: 'Day 12' },
];

let W, H, R;
let rotX = 0.61;  // tilt (latitude center ~35°N in radians)
let rotY = -2.435; // lon center ~139.6°E
let zoom = 4.2;   // start zoomed into Japan
const MIN_ZOOM = 1.0;
const MAX_ZOOM = 12.0;

let dragging = false, lastMX = 0, lastMY = 0;
let animFrame = 0;
let autoRotate = true;

function resize() {
  const cont = canvas.parentElement;
  W = cont.clientWidth;
  H = cont.clientHeight;
  canvas.width = W;
  canvas.height = H;
  R = Math.min(W, H) * 0.38;
}

// Convert lat/lon to 3D unit sphere (standard: Y up)
function llTo3d(lat, lon) {
  const φ = lat * Math.PI / 180;
  const λ = lon * Math.PI / 180;
  return {
    x: Math.cos(φ) * Math.cos(λ),
    y: Math.sin(φ),
    z: Math.cos(φ) * Math.sin(λ)
  };
}

// Rotate 3D point by rotY (around Y axis) then rotX (around X axis)
function rotate3d(p) {
  // around Y axis (longitude rotation)
  const cy = Math.cos(rotY), sy = Math.sin(rotY);
  let x1 = p.x * cy - p.z * sy;
  let z1 = p.x * sy + p.z * cy;
  let y1 = p.y;
  // around X axis (latitude tilt)
  const cx = Math.cos(rotX), sx = Math.sin(rotX);
  let y2 = y1 * cx - z1 * sx;
  let z2 = y1 * sx + z1 * cx;
  return { x: x1, y: y2, z: z2 };
}

function project(p3) {
  // orthographic projection, zoom scales the globe
  const scale = R * zoom;
  return {
    sx: W / 2 + p3.x * scale,
    sy: H / 2 - p3.y * scale,
    visible: p3.z > 0
  };
}

function drawSphere() {
  // Globe body
  ctx.beginPath();
  ctx.arc(W/2, H/2, R * zoom, 0, Math.PI * 2);
  ctx.fillStyle = '#08111F';
  ctx.fill();

  // Atmosphere glow ring
  const atm = ctx.createRadialGradient(W/2, H/2, R*zoom*0.85, W/2, H/2, R*zoom*1.08);
  atm.addColorStop(0, 'rgba(76,123,255,0)');
  atm.addColorStop(0.7, 'rgba(76,123,255,0.06)');
  atm.addColorStop(1, 'rgba(76,123,255,0.18)');
  ctx.beginPath();
  ctx.arc(W/2, H/2, R*zoom*1.08, 0, Math.PI*2);
  ctx.fillStyle = atm;
  ctx.fill();

  // Clip to sphere for grid lines
  ctx.save();
  ctx.beginPath();
  ctx.arc(W/2, H/2, R * zoom - 0.5, 0, Math.PI * 2);
  ctx.clip();

  // Grid lines
  const gridAlpha = Math.min(0.18, 0.04 * zoom);
  // Latitude lines
  for (let lat = -80; lat <= 80; lat += 10) {
    ctx.beginPath();
    let started = false;
    for (let lon = -180; lon <= 180; lon += 2) {
      const p3 = rotate3d(llTo3d(lat, lon));
      if (p3.z > 0) {
        const s = project(p3);
        if (!started) { ctx.moveTo(s.sx, s.sy); started = true; }
        else ctx.lineTo(s.sx, s.sy);
      } else { started = false; }
    }
    ctx.strokeStyle = `rgba(76,123,255,${gridAlpha})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }
  // Longitude lines
  for (let lon = -180; lon < 180; lon += 10) {
    ctx.beginPath();
    let started = false;
    for (let lat = -90; lat <= 90; lat += 2) {
      const p3 = rotate3d(llTo3d(lat, lon));
      if (p3.z > 0) {
        const s = project(p3);
        if (!started) { ctx.moveTo(s.sx, s.sy); started = true; }
        else ctx.lineTo(s.sx, s.sy);
      } else { started = false; }
    }
    ctx.strokeStyle = `rgba(76,123,255,${gridAlpha})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Japan landmass outline (simplified polygon approximation)
  drawLandmass();

  ctx.restore();
}

// Draw simplified Japan + surrounding region as filled shapes
function drawLandmass() {
  // Honshu (main island) simplified
  const honshu = [
    [31.0,130.5],[31.5,131.0],[32.5,131.5],[33.0,131.8],[33.5,132.0],
    [33.8,132.5],[34.0,132.8],[34.3,133.5],[34.5,134.0],[34.7,135.0],
    [34.8,135.5],[35.0,135.8],[35.3,136.2],[35.6,136.8],[36.0,137.5],
    [36.5,138.0],[36.8,138.5],[37.0,138.8],[37.5,139.0],[37.8,139.5],
    [38.0,140.0],[38.5,140.5],[39.0,141.0],[39.5,141.3],[40.0,141.5],
    [40.5,141.8],[41.0,141.5],[41.5,141.0],[41.3,140.5],[41.0,140.0],
    [40.5,139.8],[40.0,139.5],[39.5,139.0],[39.0,138.5],[38.5,138.0],
    [38.0,137.8],[37.5,137.5],[37.0,136.8],[36.5,136.0],[36.0,135.5],
    [35.5,135.0],[35.0,134.5],[34.5,133.8],[34.0,133.0],[33.5,132.0],
    [33.0,131.5],[32.5,131.0],[32.0,130.8],[31.5,130.5],[31.0,130.5]
  ];
  // Kyushu
  const kyushu = [
    [31.0,130.0],[31.5,130.5],[32.0,131.0],[32.5,131.5],[33.0,131.8],
    [33.5,131.5],[33.8,131.0],[33.5,130.5],[33.0,130.0],[32.5,129.5],
    [32.0,129.3],[31.5,129.5],[31.0,130.0]
  ];
  // Shikoku
  const shikoku = [
    [33.5,132.5],[33.8,133.0],[34.0,133.5],[34.2,134.0],[34.0,134.5],
    [33.8,134.2],[33.5,133.8],[33.3,133.2],[33.5,132.5]
  ];
  // Hokkaido
  const hokkaido = [
    [41.5,141.0],[42.0,141.5],[42.5,141.8],[43.0,141.5],[43.5,141.0],
    [44.0,141.5],[44.5,142.0],[44.8,143.0],[44.5,143.8],[44.0,144.5],
    [43.5,145.0],[43.0,144.8],[42.5,144.0],[42.0,143.5],[41.8,143.0],
    [41.5,142.5],[41.3,141.8],[41.5,141.0]
  ];

  [honshu, kyushu, shikoku, hokkaido].forEach(island => {
    ctx.beginPath();
    let started = false;
    island.forEach(([lat, lon]) => {
      const p3 = rotate3d(llTo3d(lat, lon));
      if (p3.z > 0) {
        const s = project(p3);
        if (!started) { ctx.moveTo(s.sx, s.sy); started = true; }
        else ctx.lineTo(s.sx, s.sy);
      }
    });
    ctx.closePath();
    ctx.fillStyle = 'rgba(76,123,255,0.14)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(76,123,255,0.45)';
    ctx.lineWidth = 1;
    ctx.stroke();
  });
}

let dashOffset = 0;

function drawRoutes() {
  ctx.save();
  ctx.beginPath();
  ctx.arc(W/2, H/2, R * zoom - 0.5, 0, Math.PI * 2);
  ctx.clip();

  for (let i = 0; i < CITIES.length - 1; i++) {
    const A = CITIES[i], B = CITIES[i+1];
    const a3 = llTo3d(A.lat, A.lon);
    const b3 = llTo3d(B.lat, B.lon);

    const steps = 80;
    const pts = [];
    for (let s = 0; s <= steps; s++) {
      const t = s / steps;
      // Slerp between a3 and b3 for great circle arc
      let ix = a3.x + (b3.x - a3.x) * t;
      let iy = a3.y + (b3.y - a3.y) * t;
      let iz = a3.z + (b3.z - a3.z) * t;
      // Lift arc above surface
      const len = Math.sqrt(ix*ix+iy*iy+iz*iz);
      const lift = 1 + Math.sin(t * Math.PI) * 0.12;
      ix = ix/len * lift; iy = iy/len * lift; iz = iz/len * lift;
      const p3 = rotate3d({x:ix,y:iy,z:iz});
      pts.push({...project(p3), z: p3.z});
    }

    // Draw glow
    ctx.beginPath();
    let started = false;
    pts.forEach(p => {
      if (p.visible && p.z > 0) {
        if (!started) { ctx.moveTo(p.sx, p.sy); started = true; }
        else ctx.lineTo(p.sx, p.sy);
      } else started = false;
    });
    ctx.strokeStyle = A.color + '44';
    ctx.lineWidth = 5;
    ctx.stroke();

    // Draw animated dashed line
    ctx.save();
    ctx.beginPath();
    started = false;
    pts.forEach(p => {
      if (p.visible && p.z > 0) {
        if (!started) { ctx.moveTo(p.sx, p.sy); started = true; }
        else ctx.lineTo(p.sx, p.sy);
      } else started = false;
    });
    const grad = ctx.createLinearGradient(
      project(rotate3d(a3)).sx, project(rotate3d(a3)).sy,
      project(rotate3d(b3)).sx, project(rotate3d(b3)).sy
    );
    grad.addColorStop(0, A.color);
    grad.addColorStop(1, B.color);
    ctx.strokeStyle = grad;
    ctx.lineWidth = 2;
    ctx.setLineDash([6, 4]);
    ctx.lineDashOffset = -dashOffset;
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
  ctx.restore();
}

function drawCities() {
  ctx.save();
  ctx.beginPath();
  ctx.arc(W/2, H/2, R * zoom - 0.5, 0, Math.PI * 2);
  ctx.clip();

  CITIES.forEach((c, i) => {
    const p3 = rotate3d(llTo3d(c.lat, c.lon));
    if (p3.z < 0.05) return;
    const s = project(p3);

    // Pulse ring
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.002 + i);
    const prad = (zoom > 3 ? 14 : 9) + pulse * 5;
    ctx.beginPath();
    ctx.arc(s.sx, s.sy, prad, 0, Math.PI * 2);
    ctx.fillStyle = c.color + '18';
    ctx.fill();

    // Inner glow
    ctx.beginPath();
    ctx.arc(s.sx, s.sy, zoom > 3 ? 7 : 5, 0, Math.PI * 2);
    ctx.fillStyle = c.color + '55';
    ctx.fill();

    // Core dot
    ctx.beginPath();
    ctx.arc(s.sx, s.sy, zoom > 3 ? 4 : 3, 0, Math.PI * 2);
    ctx.fillStyle = c.color;
    ctx.fill();

    // Label (only if visible enough)
    if (p3.z > 0.2 && zoom > 2) {
      const fs = Math.max(10, Math.min(13, zoom * 2));
      ctx.font = `600 ${fs}px 'DM Sans',sans-serif`;
      ctx.fillStyle = '#DDE2F0';
      ctx.fillText(c.name, s.sx + 8, s.sy + 3);
      ctx.font = `400 ${fs-1}px 'DM Sans',sans-serif`;
      ctx.fillStyle = '#445068';
      ctx.fillText(c.days, s.sx + 8, s.sy + 3 + fs);
    }
  });
  ctx.restore();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  dashOffset = (dashOffset + 0.3) % 20;
  if (autoRotate && !dragging) rotY -= 0.0015;
  drawSphere();
  drawRoutes();
  drawCities();
  requestAnimationFrame(draw);
}

// --- Interaction ---
canvas.addEventListener('mousedown', e => {
  dragging = true; autoRotate = false;
  lastMX = e.clientX; lastMY = e.clientY;
});
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastMX, dy = e.clientY - lastMY;
  rotY -= dx * 0.005;
  rotX += dy * 0.005;
  rotX = Math.max(-1.4, Math.min(1.4, rotX));
  lastMX = e.clientX; lastMY = e.clientY;
});
window.addEventListener('mouseup', () => { dragging = false; });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? -0.25 : 0.25;
  zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoom + delta));
}, { passive: false });

function zoomIn() { zoom = Math.min(MAX_ZOOM, zoom + 0.8); }
function zoomOut() { zoom = Math.max(MIN_ZOOM, zoom - 0.8); }
function resetView() {
  rotX = 0.61; rotY = -2.435; zoom = 4.2; autoRotate = true;
}

// Touch support
let lastTouchDist = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    dragging = true; autoRotate = false;
    lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
  }
  if (e.touches.length === 2) {
    lastTouchDist = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1 && dragging) {
    const dx = e.touches[0].clientX - lastMX, dy = e.touches[0].clientY - lastMY;
    rotY -= dx * 0.005; rotX += dy * 0.005;
    rotX = Math.max(-1.4, Math.min(1.4, rotX));
    lastMX = e.touches[0].clientX; lastMY = e.touches[0].clientY;
  }
  if (e.touches.length === 2 && lastTouchDist !== null) {
    const d = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
    zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoom + (d - lastTouchDist) * 0.02));
    lastTouchDist = d;
  }
}, { passive: true });
canvas.addEventListener('touchend', () => { dragging = false; lastTouchDist = null; });

resize();
draw();
</script>
